[pytest]
addopts = --cov=src/gpxmapper --cov-report=term --cov-report=html --cov-report=lcov
minversion = 7.0
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO

# Markers for async tests and slow tests
markers =
    asyncio: mark test as asyncio
    slow: mark test as slow

