[tool.commitizen]
version = "0.3.0"
name = "cz_conventional_commits"
# Pre-commit commitizen hook: skip strict conventional check for these subject prefixes
# (see defaults in commitizen). Subjects are plain conventional; Jira key lives in body.
allowed_prefixes = [
    "Merge",
    "Revert",
    "Pull request",
    "fixup!",
    "squash!",
    "amend!",
]
tag_format = "$version"
version_scheme = "pep440"
update_changelog_on_bump = true
changelog_file = "CHANGELOG.md"
major_version_zero = true
version_files = [
    "pyproject.toml:version",
    "src/gpxmapper/__init__.py:__version__",
    "VERSION"
]
