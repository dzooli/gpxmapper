name: Create Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  release:
    permissions:
      contents: write  # Needed for creating releases and pushing tags
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for commitizen to work properly

    - name: Install uv-sync
      uses: fikra-tech/uv-sync@v1
      with:
        python-version: '3.12'
        uv-version: 'latest'
        extra-args: '--all-packages --dev'

    - name: Bump version with commitizen
      id: cz
      run: |
        git config --global user.name "${{ github.repository_owner }}"
        git config --global user.email "${{ github.repository_owner }}@users.noreply.github.com"
        cz bump --yes
        $version = python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])"
        echo "version=$version" >> $env:GITHUB_OUTPUT
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push changes and tags
      run: |
        git push
        git push --tags
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build executable
      run: |
        python build_exe.py

    - name: Create release zip
      run: |
        $version = "${{ steps.cz.outputs.version }}"
        $root = "release"
        if (Test-Path -LiteralPath $root) { Remove-Item -LiteralPath $root -Recurse -Force }
        $bundleDir = "$root\gpxmapper-v$version"
        New-Item -ItemType Directory -Path "$bundleDir\doc" -Force | Out-Null
        Copy-Item "dist\gpxmapper.exe" -Destination "$bundleDir\"
        Copy-Item "README.md" -Destination "$bundleDir\"
        Copy-Item "LICENSE" -Destination "$bundleDir\"
        Copy-Item "CHANGELOG.md" -Destination "$bundleDir\"
        Copy-Item "nominatim\start_server.sh" -Destination "$bundleDir\"
        Copy-Item "nominatim\verify_local_hungary.sh" -Destination "$bundleDir\"
        Copy-Item "nominatim\start_server.bat" -Destination "$bundleDir\"
        Copy-Item "install\doc\USER_GUIDE.md" -Destination "$bundleDir\doc\"
        Copy-Item "install\doc\THIRD_PARTY_NOTICES.md" -Destination "$bundleDir\doc\"
        $zipName = "gpxmapper-v$version.zip"
        # Zip release\gpxmapper-v{version} so archive root is gpxmapper-v{version}/
        Compress-Archive -LiteralPath $bundleDir -DestinationPath $zipName
        echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
      shell: pwsh

    # Same layout as build.yml: release/ contains only gpxmapper-v{version}/; path release/
    # uploads that folder as the artifact root. GitHub Release attaches the zip above.
    - name: Upload release bundle folder as artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release-bundle
        path: release/
        retention-days: 1

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ZIP_NAME }}
        name: Release v${{ steps.cz.outputs.version }}
        tag_name: v${{ steps.cz.outputs.version }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
