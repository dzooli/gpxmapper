name: Build Windows Executable

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv-sync
      uses: fikra-tech/uv-sync@v1
      with:
        python-version: '3.12'
        uv-version: 'latest'
        extra-args: '--all-packages --dev'

    - name: Build executable
      run: |
        python build_exe.py

    # Stage under release/gpxmapper-v{version}/. upload-artifact with path release/
    # (trailing slash) uploads *contents* of release/ — one child folder — so the
    # download root is gpxmapper-v{version}/ (no loose files, no extra release/ prefix).
    # Do not pre-zip for upload-artifact (single zip layer from Actions).
    - name: Assemble Windows bundle folder
      run: |
        $version = python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])"
        $root = "release"
        if (Test-Path -LiteralPath $root) { Remove-Item -LiteralPath $root -Recurse -Force }
        $bundleDir = "$root\gpxmapper-v$version"
        New-Item -ItemType Directory -Path "$bundleDir\doc" -Force | Out-Null
        Copy-Item "dist\gpxmapper.exe" -Destination "$bundleDir\"
        Copy-Item "README.md" -Destination "$bundleDir\"
        Copy-Item "LICENSE" -Destination "$bundleDir\"
        Copy-Item "CHANGELOG.md" -Destination "$bundleDir\"
        Copy-Item "nominatim\start_server.sh" -Destination "$bundleDir\"
        Copy-Item "nominatim\verify_local_hungary.sh" -Destination "$bundleDir\"
        Copy-Item "nominatim\start_server.bat" -Destination "$bundleDir\"
        Copy-Item "install\doc\USER_GUIDE.md" -Destination "$bundleDir\doc\"
      shell: pwsh

    - name: Upload Windows bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: gpxmapper-windows-bundle
        path: release/
        retention-days: 1
